<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Resume</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Mono', monospace; }
    h1, h2, label { font-family: 'Syne', sans-serif; }

    .fade-in {
      animation: fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .drop-zone.dragging {
      border-color: #34d399;
      background-color: rgba(52, 211, 153, 0.05);
    }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-zinc-800 px-8 py-5 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
      <span class="text-xs text-zinc-500 tracking-widest uppercase">Student Portal</span>
    </div>
    <h1 class="text-xl font-extrabold tracking-tight text-white">Resume<span class="text-emerald-400">Scan</span></h1>
    <span class="text-xs text-zinc-600 tracking-widest uppercase">v1.0</span>
  </header>

  <!-- Main -->
  <main class="flex-1 flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-lg fade-in">

      <!-- Card -->
      <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl">

        <h2 class="text-3xl font-bold text-white mb-1">Upload Resume</h2>
        <p class="text-zinc-500 text-xs mb-8">PDF only · Max 5MB · Results shown instantly</p>

        <!-- Drop zone -->
        <div
          id="dropZone"
          class="drop-zone border-2 border-dashed border-zinc-700 rounded-xl p-8 text-center cursor-pointer transition-all duration-200 hover:border-emerald-600 mb-6"
          onclick="document.getElementById('fileInput').click()"
        >
          <p class="text-3xl mb-3">📄</p>
          <p class="text-zinc-300 text-sm font-medium">Drop your PDF here</p>
          <p class="text-zinc-600 text-xs mt-1">or click to browse</p>
          <p id="fileName" class="mt-4 text-emerald-400 text-xs font-mono hidden"></p>
        </div>

        <!-- Hidden file input -->
        <input
          id="fileInput"
          type="file"
          accept="application/pdf"
          class="hidden"
          onchange="handleFileSelect(this)"
        />

        <!-- Error message -->
        <p id="errorMsg" class="hidden text-red-400 text-xs mb-4 text-center"></p>

        <!-- Upload button -->
        <button
          id="uploadBtn"
          onclick="upload()"
          class="w-full bg-emerald-500 hover:bg-emerald-400 active:scale-95 text-zinc-950
                 font-bold text-sm py-3 rounded-lg transition-all duration-150"
        >
          Upload &amp; Analyse
        </button>
      </div>

      <!-- Results card -->
      <div id="results" class="hidden mt-6 bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl fade-in">

        <p class="text-xs text-zinc-500 tracking-widest uppercase mb-6">Analysis Result</p>

        <!-- Score -->
        <div class="mb-6">
          <p class="text-xs text-zinc-500 mb-2 uppercase tracking-widest">Resume Score</p>
          <div class="flex items-end gap-3">
            <span id="scoreValue" class="text-5xl font-extrabold text-white" style="font-family:'Syne',sans-serif"></span>
            <span class="text-zinc-600 text-sm mb-2">/ 100</span>
          </div>
          <div class="mt-3 w-full bg-zinc-800 rounded-full h-1.5 overflow-hidden">
            <div id="scoreBar" class="h-full rounded-full transition-all duration-700" style="width:0%"></div>
          </div>
        </div>

        <!-- Divider -->
        <div class="border-t border-zinc-800 mb-6"></div>

        <!-- Skills -->
        <div>
          <p class="text-xs text-zinc-500 mb-3 uppercase tracking-widest">Detected Skills</p>
          <ul id="skillsList" class="flex flex-wrap gap-2"></ul>
          <p id="noSkills" class="hidden text-zinc-600 text-xs">No skills detected.</p>
        </div>

        <!-- Divider -->
        <div class="border-t border-zinc-800 mb-6 mt-6"></div>

        <!-- Score Breakdown -->
        <div id="breakdownSection" class="hidden">
          <p class="text-xs text-zinc-500 mb-4 uppercase tracking-widest">Score Breakdown</p>
          <ul id="breakdownList" class="space-y-3"></ul>
        </div>
      </div>

    </div>
  </main>

  <script src="student.js"></script>

</body>
</html>
